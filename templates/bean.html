{% extends "layout.html" %}

{% block title %}Bean{% endblock %}

{% block content %}
<section class="learning-view">
  <div class="row g-4 align-items-center">
    <div class="col-lg-6">
      <h1 class="lesson-title">{{ bean.name }}</h1>
      <p class="lesson-text">{{ bean.content }}</p>
      <div class="d-flex gap-3 mt-4 flex-wrap">
        <a href="/learn/10" class="btn btn-brand-dark action-btn">Select This Bean</a>
        {% if index + 1 < total %}
          <a href="/learn/{{ step + 1 }}" class="btn btn-brand-light action-btn">Next Bean</a>
        {% else %}
          <a href="/learn/{{ step + 1 }}" class="btn btn-brand-light action-btn">Finish Exploration</a>
        {% endif %}
      </div>
    </div>
    <div class="col-lg-6">
      <img src="{{ bean.image }}" alt="{{ bean.name }}" class="lesson-image">
    </div>
  </div>
</section>

{% endblock %}
