{% extends "layout.html" %}

{% block title %}Bean{% endblock %}

{% block content %}

<div class="card p-4 shadow">

    <div class="row">

        <!-- TEXT -->
        <div class="col-md-6">
            <h2>{{ bean.name }}</h2>
            <p class="mt-3">{{ bean.content }}</p>

            <!-- Buttons -->
            <div class="mt-4">

                <!-- Select Bean -->
                <a href="/select_bean/{{ index }}" class="btn btn-success">
                    Select This Bean
                </a>

                <!-- Next Bean -->
                {% if index + 1 < total %}
                    <a href="/beans/{{ index + 1 }}" class="btn btn-primary">
                        Next Bean →
                    </a>
                {% else %}
                    <a href="/learn/5" class="btn btn-secondary">
                        Finish Exploration
                    </a>
                {% endif %}

            </div>
        </div>

        <!-- IMAGE -->
        <div class="col-md-6 text-center">
            <img src="{{ bean.image }}" class="img-fluid rounded shadow" style="max-height: 300px;">
        </div>

    </div>

</div>

{% endblock %}
