<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Making Americano{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Raleway:wght@700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  {% block extra_head %}{% endblock %}
</head>

<body>
<div class="page-shell">
<nav class="navbar navbar-expand-md main-nav">
  <div class="container nav-wrap">
    <a href="/" class="navbar-brand brand-text text-decoration-none">
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Making Americano logo" class="brand-logo">
      <span>Making Americano</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
            aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav ms-auto nav-gap">
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path.startswith('/learn') and step is defined and step < 12 %}active{% endif %}" href="/learn/1">Insights</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path.startswith('/learn') and step is defined and step >= 12 %}active{% endif %}" href="/learn/12">Tutorial</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path.startswith('/quiz') or request.path.startswith('/result') %}active{% endif %}" href="/quiz/1">Quiz</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main class="main-content">

    {% block content %}{% endblock %}
 
</main>

<footer class="main-footer">
  <div class="container text-center">
    <p class="m-0">© Making Americano - Learning App</p>
  </div>
</footer>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% block extra_script %}{% endblock %}
</body>
</html>
