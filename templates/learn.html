{% extends "layout.html" %}

{% block title %}Learn{% endblock %}

{% block content %}

<div class="card shadow p-4">

    <div class="row">

        <!-- LEFT: TEXT CONTENT -->
        <div class="col-md-6">
            <h2>{{ lesson.title }}</h2>
            <p class="mt-3">{{ lesson.content }}</p>

            {% if lesson.action %}
                <a href="{{ lesson.action }}" class="btn btn-primary mt-3">
                    Explore Beans →
                </a>
            {% else %}
                <a href="/learn/{{ step + 1 }}" class="btn btn-success mt-3">
                    Next →
                </a>
            {% endif %}

            <!-- Navigation -->
            
        </div>

        <!-- RIGHT: IMAGE / MEDIA -->
        {% if lesson.image %}
        <div class="col-md-6 d-flex align-items-center justify-content-center">
                <div class="image-container">
                    <img src="{{ lesson.image }}" alt="Lesson Image" class="img-fluid lesson-img">
                </div>
        </div>
        {% endif %}
    </div>

</div>

{% endblock %}
